    <!-- Critical resource preconnects to reduce network dependency chains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://xbwaphzntaxmdfzfsmvt.supabase.co" crossorigin>
    
    <!-- Additional preconnects for external resources -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.gpteng.co">
    
    <!-- Video hero preload removed — video loads via React -->
    
    <!-- Critical API endpoint preloads to reduce network dependency chains -->
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- Immediate CSS inlining for LCP elements -->
    <style id="critical-inline-css">
      /* Minimal critical CSS — skeleton + font fallbacks only */
      .fcp-loading {
        display: inline-block;
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(255,255,255,0.25);
        border-top: 3px solid #C0392B;
        border-radius: 50%;
        animation: fcp-spin 0.8s linear infinite;
      }
      @keyframes fcp-spin { to { transform: rotate(360deg); } }
      .react-loaded #loading-skeleton { display: none; }
      .font-route66 { font-family: 'Bebas Neue', 'Arial Black', 'Impact', sans-serif; font-weight: 400; font-display: swap; }
      .font-playfair { font-family: 'Playfair Display', Georgia, serif; font-display: swap; }
    </style>
    
    <!-- Completely eliminate render-blocking fonts -->
    <script>
      // Ultra-aggressive non-blocking font loading
      (function() {
        const loadCriticalFonts = () => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap';
          link.media = 'print';
          link.onload = function() { this.media = 'all'; };
          link.onerror = function() { console.warn('Font loading failed'); };
          document.head.appendChild(link);
        };
        
        // Load fonts after a minimal delay to ensure no render blocking
        setTimeout(loadCriticalFonts, 0);
      })();
    </script>
    
    <!-- Completely non-blocking font loading strategy -->
    <script>
      // Asynchronous font loading without render blocking
      (function() {
        const loadFonts = () => {
          // Load critical fonts with media="print" trick for non-blocking
          const criticalLink = document.querySelector('link[href*="Bebas+Neue"]');
          if (criticalLink) {
            criticalLink.media = 'all';
          }
          
          // Load additional fonts after brief delay
          setTimeout(() => {
            const additionalFonts = document.createElement('link');
            additionalFonts.rel = 'stylesheet';
            additionalFonts.href = 'https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap';
            additionalFonts.media = 'print';
            additionalFonts.onload = function() { this.media = 'all'; };
            document.head.appendChild(additionalFonts);
          }, 100);
        };
        
        // Load fonts after DOMContentLoaded to avoid blocking critical path
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadFonts);
        } else {
          loadFonts();
        }
      })();
    </script>
    
    <!-- Static fallback SEO for crawlers before JS executes; React Helmet overrides per-route -->
    <title>Ramble 66 — Route 66 Interactive Map & Trip Planner</title>
    <meta name="description" content="Plan your ultimate Route 66 road trip with Ramble 66: Interactive Route 66 Google Map, Shareable Travel Planner, Route 66 Events Calendar, and Route 66 Blog & News." />
    <meta name="robots" content="index, follow" />
    <!-- Theme color only - all other meta tags handled by React Helmet -->
    <meta name="theme-color" content="#1B60A3">

    <!-- Enhanced canonicalization: redirect lovable.app and www to apex domain -->
    <script>
      (function() {
        var h = window.location.hostname;
        var href = window.location.href;
        var shouldRedirect = false;
        var target = '';
        
        // Redirect www.ramble66.com → ramble66.com
        if (h && h.slice(0,4).toLowerCase() === 'www.') {
          target = window.location.protocol + '//' + h.slice(4) + window.location.pathname + window.location.search + window.location.hash;
          shouldRedirect = true;
        }
        // Redirect ramble66.lovable.app → ramble66.com
        else if (h && h.toLowerCase() === 'ramble66.lovable.app') {
          target = 'https://ramble66.com' + window.location.pathname + window.location.search + window.location.hash;
          shouldRedirect = true;
        }
        
        if (shouldRedirect) {
          window.location.replace(target);
        }
      })();
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; background: #1a1a1a; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body class="bg-white">
    <!-- Minimal loading skeleton matching current video hero -->
    <div id="loading-skeleton" style="
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 85vh;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    ">
      <div class="fcp-loading"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Ultra-aggressive LCP optimization - Hide skeleton after minimal delay
      const optimizeUltraLCP = () => {
        const skeleton = document.getElementById('loading-skeleton');
        
        // Hide skeleton as soon as possible to prevent blocking LCP
        const hideSkeletonFast = () => {
          if (skeleton) {
            skeleton.style.opacity = '0';
            skeleton.style.transition = 'opacity 0.2s ease';
            setTimeout(() => {
              skeleton.style.display = 'none';
            }, 200);
          }
          document.body.classList.add('react-loaded');
        };
        
        // Hide immediately if DOM is ready, otherwise wait minimally
        if (document.readyState !== 'loading') {
          setTimeout(hideSkeletonFast, 50);
        } else {
          document.addEventListener('DOMContentLoaded', () => {
            setTimeout(hideSkeletonFast, 50);
          });
        }
      };
      
      // Start optimization immediately
      optimizeUltraLCP();
    </script>
    <script src="https://cdn.gpteng.co/gptengineer.js" defer></script>
  </body>
</html>
